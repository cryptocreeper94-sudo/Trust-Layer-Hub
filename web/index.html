<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Trust Layer Hub</title>
    <meta name="theme-color" content="#0c1224" />
    <meta name="description" content="The front door to the Trust Layer blockchain ecosystem. Manage your Signal (SIG) wallet, access 35 ecosystem apps, chat securely, and verify on-chain." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trust Layer" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; background-color: #0c1224; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").then(
            function (reg) { console.log("SW registered:", reg.scope); },
            function (err) { console.log("SW registration failed:", err); }
          );
        });
      }
    </script>
  </body>
</html>
